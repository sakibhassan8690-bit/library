<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOY LIBRARY</title>

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(45deg,#ff6b6b,#48dbfb,#1dd1a1,#feca57);
background-size:300% 300%;
animation:bg 8s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:100%;
max-width:380px;
padding:35px;
border-radius:18px;

background:
linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)),
url("box.png") center/cover no-repeat;

box-shadow:0 15px 35px rgba(0,0,0,.4);
border:1px solid rgba(255,255,255,.2);
text-align:center;
}

.profile-wrapper{
width:140px;
height:140px;
margin:auto;
padding:4px;
border-radius:50%;
background:linear-gradient(45deg,#ff6b6b,#48dbfb,#1dd1a1,#feca57);
}

.profile{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
background:#fff;
}

.name{
margin-top:20px;
font-size:28px;
font-weight:700;
background:linear-gradient(45deg,#ff6b6b,#48dbfb,#1dd1a1,#feca57);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:bg 5s infinite;
}

.bio{
margin:8px 0 25px;
color:#fff;
font-size:15px;
}

.social-btn{
width:100%;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
padding:15px;
margin-bottom:15px;
border-radius:10px;
text-decoration:none;
font-size:16px;
font-weight:600;
color:#fff;
transition:.3s;
min-height:56px;
}

.social-btn i{
font-size:20px;
}

.social-btn:hover{
transform:translateY(-3px);
}

.facebook{
background:#1877F2;
}

.facebook:hover{
background:#0f63d8;
}

.whatsapp{
background:#25D366;
}

.whatsapp:hover{
background:#1ebd52;
}

.instagram{
background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);
}

.instagram:hover{
filter:brightness(1.1);
}

.tiktok{
background:#000;
}

.tiktok:hover{
box-shadow:-3px -3px 10px #00f2fe,3px 3px 10px #ff0050;
}

@media(max-width:400px){

.card{
padding:25px;
}

.profile-wrapper{
width:120px;
height:120px;
}

.name{
font-size:24px;
}

.social-btn{
padding:14px;
font-size:15px;
}

}
</style>
</head>

<body>

<div class="card">

<div class="profile-wrapper">
<img src="profile.png" class="profile" alt="Profile">
</div>

<h2 class="name">JOY LIBRARY</h2>

<p class="bio">📍 Lakshmipur, Bangladesh</p>

<a class="social-btn facebook"
href="https://www.facebook.com/share/1F3Z5ySMwb/"
target="_blank">
<i class="fa-brands fa-facebook-f"></i>
Facebook
</a>

<a class="social-btn whatsapp"
href="https://wa.me/8801576422185"
target="_blank">
<i class="fa-brands fa-whatsapp"></i>
WhatsApp
</a>

<a class="social-btn instagram"
href="#"
target="_blank">
<i class="fa-brands fa-instagram"></i>
Instagram
</a>

<a class="social-btn tiktok"
href="#"
target="_blank">
<i class="fa-brands fa-tiktok"></i>
TikTok
</a>

</div>

</body>
</html>
